<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnipVault — AI Snippet Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2127;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #7a7f8e;
    --accent: #4f7fff;
    --accent-dim: rgba(79,127,255,0.12);
    --accent-border: rgba(79,127,255,0.35);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.1);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.1);
    --red: #ff5a5f;
    --red-dim: rgba(255,90,95,0.1);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.1);
    --radius: 10px;
    --radius-lg: 14px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* header */
  header { border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .header-stats { display: flex; gap: 20px; }
  .hstat { font-size: 12px; color: var(--muted); }
  .hstat strong { color: var(--text); font-weight: 500; margin-right: 3px; }

  /* layout */
  .layout { display: flex; height: calc(100vh - 56px); }
  aside { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
  main { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* sidebar */
  .sidebar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; margin-top: 12px; padding-left: 8px; }
  .sidebar-label:first-child { margin-top: 0; }
  .tag-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 7px 10px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; text-align: left; transition: background 0.15s, color 0.15s; }
  .tag-btn:hover { background: var(--surface); color: var(--text); }
  .tag-btn.active { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
  .tag-count { font-size: 11px; font-family: var(--mono); background: var(--surface2); border-radius: 4px; padding: 1px 6px; }

  /* topbar */
  .topbar { display: flex; gap: 10px; margin-bottom: 22px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .search-input { width: 100%; height: 40px; padding: 0 14px 0 38px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 14px; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent-border); }
  .search-input::placeholder { color: var(--muted); }
  .add-btn { height: 40px; padding: 0 18px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; white-space: nowrap; }
  .add-btn:hover { opacity: 0.88; }

  /* cards */
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border2); }
  .card-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; }
  .lang-badge { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; letter-spacing: -0.01em; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .ctag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); cursor: pointer; }
  .ctag:hover { color: var(--accent); border-color: var(--accent-border); }
  .card-actions { display: flex; gap: 5px; margin-left: auto; }
  .iBtn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s, color 0.12s; }
  .iBtn:hover { background: var(--border); color: var(--text); }
  .iBtn.danger:hover { color: var(--red); border-color: rgba(255,90,95,0.3); }
  pre.code { background: var(--bg); padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: #c9d1e0; line-height: 1.7; overflow-x: auto; border-top: 1px solid var(--border); white-space: pre; }
  .card-explain { padding: 10px 16px 13px; font-size: 13px; color: var(--muted); line-height: 1.6; border-top: 1px solid var(--border); background: var(--surface); font-family: var(--sans); }
  .empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }

  /* modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 18px; letter-spacing: -0.02em; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .field textarea { font-family: var(--mono); min-height: 110px; resize: vertical; line-height: 1.6; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent-border); }
  .field select option { background: var(--surface); }
  .ai-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .ai-btn { height: 36px; padding: 0 16px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); border-radius: var(--radius); font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; white-space: nowrap; }
  .ai-btn:hover { background: rgba(79,127,255,0.2); }
  .ai-btn:disabled { opacity: 0.5; cursor: default; }
  .ai-status { font-size: 12px; color: var(--muted); font-style: italic; flex: 1; }
  .explain-preview { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; color: var(--muted); line-height: 1.6; min-height: 40px; margin-bottom: 14px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
  .btn-ghost { height: 36px; padding: 0 16px; background: transparent; border: 1px solid var(--border2); border-radius: var(--radius); color: var(--muted); font-family: var(--sans); font-size: 13px; cursor: pointer; }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-save { height: 36px; padding: 0 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-save:hover { opacity: 0.88; }

  /* toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0a3d24; font-family: var(--sans); font-size: 13px; font-weight: 700; padding: 9px 20px; border-radius: 30px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 200; }
  #toast.show { opacity: 1; }

  /* lang colors */
  .l-js  { background: rgba(245,166,35,0.12); color: #c8841a; }
  .l-ts  { background: rgba(79,127,255,0.12); color: #4f7fff; }
  .l-py  { background: rgba(62,207,142,0.12); color: #1a8a5e; }
  .l-sh  { background: rgba(122,127,142,0.12); color: #9aa0b0; }
  .l-css { background: rgba(167,139,250,0.12); color: #a78bfa; }
  .l-sql { background: rgba(255,90,95,0.12); color: #ff5a5f; }
  .l-go  { background: rgba(0,200,220,0.12); color: #00c8dc; }
  .l-rs  { background: rgba(200,100,50,0.12); color: #e06030; }
  .l-xx  { background: rgba(122,127,142,0.12); color: #9aa0b0; }

  @media (max-width: 640px) {
    aside { display: none; }
    main { padding: 16px; }
    header { padding: 0 16px; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="white"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1v-2zm0 6a1 1 0 011-1h6a1 1 0 010 2H4a1 1 0 01-1-1z"/></svg>
    </div>
    SnipVault
  </div>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <div class="topbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input class="search-input" id="search" type="text" placeholder="Search snippets, tags, code..." oninput="renderAll()">
      </div>
      <button class="add-btn" onclick="openModal()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        Add snippet
      </button>
    </div>
    <div class="cards" id="cards"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">New snippet</div>
    <div class="field">
      <label>Title</label>
      <input id="m-title" type="text" placeholder="e.g. Debounce function">
    </div>
    <div class="field">
      <label>Language</label>
      <select id="m-lang">
        <option>JavaScript</option><option>TypeScript</option><option>Python</option>
        <option>Bash</option><option>CSS</option><option>SQL</option>
        <option>Go</option><option>Rust</option><option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Code</label>
      <textarea id="m-code" placeholder="Paste your code here..."></textarea>
    </div>
    <div class="ai-row">
      <button class="ai-btn" id="ai-btn" onclick="runAI()">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/></svg>
        Auto-fill with AI
      </button>
      <span class="ai-status" id="ai-status">Paste code, then click to let AI name, tag &amp; explain it.</span>
    </div>
    <div class="field">
      <label>Tags (comma separated)</label>
      <input id="m-tags" type="text" placeholder="e.g. utility, async, react">
    </div>
    <div class="field">
      <label>AI explanation</label>
      <div class="explain-preview" id="explain-preview">Will appear after AI analysis.</div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveSnippet()">Save snippet</button>
    </div>
  </div>
</div>

<div id="toast">Copied to clipboard!</div>

<script>
const LANG_META = {
  JavaScript: { cls: 'l-js', label: 'JS' },
  TypeScript:  { cls: 'l-ts', label: 'TS' },
  Python:      { cls: 'l-py', label: 'PY' },
  Bash:        { cls: 'l-sh', label: 'SH' },
  CSS:         { cls: 'l-css', label: 'CSS' },
  SQL:         { cls: 'l-sql', label: 'SQL' },
  Go:          { cls: 'l-go', label: 'GO' },
  Rust:        { cls: 'l-rs', label: 'RS' },
  Other:       { cls: 'l-xx', label: '???' },
};

let snippets = JSON.parse(localStorage.getItem('snipvault') || 'null') || [
  { id: 1, title: 'Debounce function', lang: 'JavaScript',
    code: `function debounce(fn, delay) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}`,
    tags: ['utility', 'async', 'performance'],
    explain: 'Delays invoking a function until after a wait time, resetting the timer on each call. Ideal for search inputs and window resize handlers.' },
  { id: 2, title: 'Flatten nested list', lang: 'Python',
    code: `def flatten(lst):\n    return [\n        item for sub in lst\n        for item in (\n            flatten(sub) if isinstance(sub, list)\n            else [sub]\n        )\n    ]`,
    tags: ['recursion', 'list', 'utility'],
    explain: 'Recursively flattens a deeply nested list into a single flat list using list comprehension.' },
  { id: 3, title: 'Copy to clipboard', lang: 'JavaScript',
    code: `async function copyToClipboard(text) {\n  await navigator.clipboard.writeText(text);\n  return true;\n}`,
    tags: ['browser', 'utility', 'async'],
    explain: 'Uses the modern Clipboard API to write text to the system clipboard asynchronously — works in all modern browsers.' },
  { id: 4, title: 'Batch fetch with rate limit', lang: 'TypeScript',
    code: `async function batchFetch<T>(urls: string[], limit = 3): Promise<T[]> {\n  const results: T[] = [];\n  for (let i = 0; i < urls.length; i += limit) {\n    const batch = urls.slice(i, i + limit);\n    const res = await Promise.all(batch.map(u => fetch(u).then(r => r.json())));\n    results.push(...res);\n  }\n  return results;\n}`,
    tags: ['async', 'fetch', 'rate-limit', 'typescript'],
    explain: 'Fetches a list of URLs in controlled batches to avoid hammering APIs — great for bulk data loading.' },
];
let nextId = 5;
let activeTag = 'all';
let editingId = null;

function save() { localStorage.setItem('snipvault', JSON.stringify(snippets)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function allTags() {
  const m = {};
  snippets.forEach(s => s.tags.forEach(t => { m[t] = (m[t]||0)+1; }));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function renderSidebar() {
  const tags = allTags();
  const total = snippets.length;
  const sidebar = document.getElementById('sidebar');
  const allActive = activeTag === 'all';
  sidebar.innerHTML = `
    <div class="sidebar-label">Library</div>
    <button class="tag-btn ${allActive?'active':''}" onclick="setTag('all')">
      All snippets <span class="tag-count">${total}</span>
    </button>
    <div class="sidebar-label" style="margin-top:16px">Tags</div>
    ${tags.map(([t,c])=>`
      <button class="tag-btn ${activeTag===t?'active':''}" onclick="setTag('${t}')">
        ${esc(t)} <span class="tag-count">${c}</span>
      </button>
    `).join('')}
  `;
}

function renderStats() {
  const langs = {};
  snippets.forEach(s => { langs[s.lang]=(langs[s.lang]||0)+1; });
  const top = Object.entries(langs).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('header-stats').innerHTML = `
    <span class="hstat"><strong>${snippets.length}</strong>snippets</span>
    <span class="hstat"><strong>${allTags().length}</strong>tags</span>
    ${top ? `<span class="hstat"><strong>${top[0]}</strong>top lang</span>` : ''}
  `;
}

function renderAll() {
  renderSidebar();
  renderStats();
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = snippets.filter(s => {
    const matchTag = activeTag === 'all' || s.tags.includes(activeTag);
    const matchQ = !q || s.title.toLowerCase().includes(q)
      || s.tags.some(t=>t.includes(q))
      || s.code.toLowerCase().includes(q)
      || (s.explain||'').toLowerCase().includes(q);
    return matchTag && matchQ;
  });
  const container = document.getElementById('cards');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">No snippets found. Add one above!</div>';
    return;
  }
  container.innerHTML = filtered.map(s => {
    const lm = LANG_META[s.lang] || LANG_META.Other;
    return `<div class="card" id="card-${s.id}">
      <div class="card-head">
        <span class="lang-badge ${lm.cls}">${lm.label}</span>
        <span class="card-title">${esc(s.title)}</span>
        <div class="card-tags">${s.tags.map(t=>`<span class="ctag" onclick="setTag('${t}')">${esc(t)}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="iBtn" title="Copy code" onclick="copyCode(${s.id},this)">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 000 2h8a1 1 0 011 1v10a1 1 0 01-1 1H8a1 1 0 01-1-1V6a1 1 0 011-1zM4 7a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-1h-2v1H4V9h1V7H4z"/></svg>
          </button>
          <button class="iBtn" title="Edit" onclick="editSnippet(${s.id})">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zm-2.207 2.207L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
          </button>
          <button class="iBtn danger" title="Delete" onclick="deleteSnippet(${s.id})">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zm-1 6a1 1 0 012 0v4a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v4a1 1 0 11-2 0V8z" clip-rule="evenodd"/></svg>
          </button>
        </div>
      </div>
      <pre class="code">${esc(s.code)}</pre>
      ${s.explain ? `<div class="card-explain">${esc(s.explain)}</div>` : ''}
    </div>`;
  }).join('');
}

function setTag(t) { activeTag = t; renderAll(); }

function copyCode(id, btn) {
  const s = snippets.find(x=>x.id===id);
  if (!s) return;
  navigator.clipboard.writeText(s.code).catch(()=>{});
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>`;
  btn.style.color = 'var(--green)';
  showToast();
  setTimeout(() => {
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 000 2h8a1 1 0 011 1v10a1 1 0 01-1 1H8a1 1 0 01-1-1V6a1 1 0 011-1zM4 7a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-1h-2v1H4V9h1V7H4z"/></svg>`;
    btn.style.color = '';
  }, 1800);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function deleteSnippet(id) {
  snippets = snippets.filter(s=>s.id!==id);
  save(); renderAll();
}

function editSnippet(id) {
  const s = snippets.find(x=>x.id===id);
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit snippet';
  document.getElementById('m-title').value = s.title;
  document.getElementById('m-lang').value = s.lang;
  document.getElementById('m-code').value = s.code;
  document.getElementById('m-tags').value = s.tags.join(', ');
  document.getElementById('explain-preview').textContent = s.explain || 'Will appear after AI analysis.';
  document.getElementById('ai-status').textContent = 'Paste code, then click to let AI name, tag & explain it.';
  document.getElementById('modal-overlay').classList.add('open');
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New snippet';
  document.getElementById('m-title').value = '';
  document.getElementById('m-lang').value = 'JavaScript';
  document.getElementById('m-code').value = '';
  document.getElementById('m-tags').value = '';
  document.getElementById('explain-preview').textContent = 'Will appear after AI analysis.';
  document.getElementById('ai-status').textContent = 'Paste code, then click to let AI name, tag & explain it.';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  editingId = null;
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function runAI() {
  const code = document.getElementById('m-code').value.trim();
  const lang = document.getElementById('m-lang').value;
  if (!code) { document.getElementById('ai-status').textContent = 'Paste some code first!'; return; }
  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg> Analyzing...`;
  document.getElementById('ai-status').textContent = 'Claude is reading your snippet...';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Analyze this ${lang} code snippet. Return ONLY a JSON object, no markdown, no backticks:
{
  "title": "short descriptive name (max 5 words)",
  "tags": ["tag1","tag2","tag3"],
  "explain": "one concise sentence: what it does and when to use it"
}

Code:
${code}`
        }]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if (parsed.title) document.getElementById('m-title').value = parsed.title;
    if (parsed.tags) document.getElementById('m-tags').value = parsed.tags.join(', ');
    if (parsed.explain) document.getElementById('explain-preview').textContent = parsed.explain;
    document.getElementById('ai-status').textContent = 'Done! Review and save.';
  } catch(e) {
    document.getElementById('ai-status').textContent = 'AI unavailable — fill in manually.';
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/></svg> Auto-fill with AI`;
}

function saveSnippet() {
  const title = document.getElementById('m-title').value.trim() || 'Untitled';
  const lang = document.getElementById('m-lang').value;
  const code = document.getElementById('m-code').value.trim();
  const tags = document.getElementById('m-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const explain = document.getElementById('explain-preview').textContent;
  const cleanExplain = explain === 'Will appear after AI analysis.' ? '' : explain;
  if (!code) return;
  if (editingId !== null) {
    const s = snippets.find(x=>x.id===editingId);
    if (s) { s.title=title; s.lang=lang; s.code=code; s.tags=tags; s.explain=cleanExplain; }
  } else {
    snippets.unshift({ id: nextId++, title, lang, code, tags, explain: cleanExplain });
  }
  save();
  closeModal();
  renderAll();
}

renderAll();
</script>
</body>
</html>
